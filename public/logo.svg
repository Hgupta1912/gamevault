    <rect class="logo-dpad" x="51" y="56" width="10" height="30" rx="2"/>
    <rect class="logo-dpad" x="41" y="66" width="30" height="10" rx="2"/>

    <circle class="logo-btn" cx="88" cy="65" r="6"/>
    <circle class="logo-btn-b" cx="95" cy="78" r="6"/>

    <circle class="logo-stick" cx="40" cy="100" r="8"/>
    <circle class="logo-stick" cx="80" cy="100" r="8"/>
