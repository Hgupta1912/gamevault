<svg width="140" height="175" viewBox="220 0 140 175" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GameVault icon</title>
  <desc>Controller-inspired shield icon for GameVault</desc>

  <style>
    .logo-shield { fill: #f000e4; }
    .logo-inner { fill: #0f1117; }
    .logo-dpad { fill: #f000e4; }
    .logo-btn { fill: #6c63ff; }
    .logo-btn-b { fill: #e05c5c; }
    .logo-stick { fill: #1a1d2e; stroke: #f000e4; stroke-width: 1.5; }
